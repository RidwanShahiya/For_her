<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Kamu ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #8b0000, #c4002f, #ff758c);
      overflow-x: hidden;
      overflow-y: auto;
      padding: 24px 14px 40px;
      visibility: hidden;
    }

    .wrap {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    .container {
      background: rgba(15,15,20,0.96);
      color: white;
      padding: 24px 18px;
      border-radius: 24px;
      text-align: center;
      margin-top: 40px;
    }

    h1 {
      color: #ff5c7a;
      margin-bottom: 14px;
    }

    h2 {
      color: #ff5c7a;
      margin: 18px 0;
    }

    p {
      color: #e7e7e7;
      line-height: 1.8;
      margin-bottom: 18px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: #ff3d68;
      color: white;
      padding: 14px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-top: 15px;
    }

    .hidden {
      display: none;
    }

    /* popup */
    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-box {
      background: #111;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      width: 90%;
      max-width: 320px;
      color: white;
    }

    .heart {
      position: fixed;
      top: -20px;
      font-size: 24px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2>⚠️ Perhatian</h2>
    <p>Website ini ada suara ya 🎵<br>jangan kaget 😆</p>
    <button onclick="mulaiWeb()">Lanjut 💖</button>
  </div>
</div>

<div class="wrap">

  <!-- HALAMAN 1 -->
  <div id="halaman1" class="container">
    <h1>Hai Kamu 💗</h1>
    <p id="typing"></p>
    <button onclick="lanjut()">Klik ini ya 🥺👉👈</button>
  </div>

  <!-- HALAMAN 2 -->
  <div id="halaman2" class="container hidden">
    <p>
      Aku tahu aku sering bikin kamu kecewa 😔  
      Aku minta maaf ya...
    </p>

    <p>
      Kamu sangat berarti buat aku 💖  
      Jangan menghilang ya...
    </p>

    <h2>Maafin aku ya 😔💗</h2>

    <img src="foto.jpg">

    <button onclick="bahagia()">Iya Aku Maafkan 💖</button>
  </div>

  <!-- HALAMAN 3 -->
  <div id="halaman3" class="container hidden">
    <h1>YEAYYYYYYY 🎉</h1>
    <h2>YIPPY YIPPY YIPPY 🥳💖</h2>

    <img src="happy.gif">
  </div>

</div>

<!-- AUDIO -->
<audio id="lagu" loop>
  <source src="lagu.mp3">
</audio>

<audio id="happy" loop>
  <source src="happy.mp3">
</audio>

<script>
  function mulaiWeb() {
    document.getElementById("popup").style.display = "none";
    document.body.style.visibility = "visible";
  }

  let text = "Aku punya sesuatu yang ingin aku bilang ke kamu...";
  let i = 0;

  function ketik() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(ketik, 100);
    }
  }
  ketik();

  function lanjut() {
    document.getElementById("halaman1").classList.add("hidden");
    document.getElementById("halaman2").classList.remove("hidden");

    document.getElementById("lagu").play();
  }

  function bahagia() {
    document.getElementById("halaman2").classList.add("hidden");
    document.getElementById("halaman3").classList.remove("hidden");

    document.getElementById("lagu").pause();
    document.getElementById("happy").play();
  }

  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💗";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 400);
</script>

</body>
</html>
