```html
<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk Kamu ❤️</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.container{
width:90%;
max-width:400px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:fade 1.5s;
}

h1{
color:#ff4d6d;
font-size:28px;
}

p{
font-size:16px;
color:#444;
line-height:1.5;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
width:100%;
}

button:hover{
background:#ff1f4b;
}

.hidden{
display:none;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

/* hati jatuh */

.heart{
position:fixed;
top:-10px;
color:red;
font-size:18px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

/* popup */

.popup{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:25px;
border-radius:20px 20px 0 0;
box-shadow:0 -5px 20px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="container">

<h1>Hai Kamu ❤️</h1>

<p id="typing"></p>

<button onclick="openMessage()">Pencet ini dong 😳</button>

<div id="message" class="hidden">

<p>
Aku cuma mau bilang sesuatu...
</p>

<p>
Sejak kenal kamu, hidupku berubah 😌  
Hari-hariku jadi lebih cerah ☀️  
Senyumku jadi lebih sering 😁  
</p>

<p>
Dan aku sadar satu hal...
</p>

<h2 style="color:#ff4d6d;">Aku Sayang Kamu ❤️</h2>

</div>

</div>

<script>

/* efek mengetik */

let text="Aku punya sesuatu yang mau aku bilang ke kamu...";
let i=0;

function typing(){

if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}

}

typing();

/* tombol */

function openMessage(){
document.getElementById("message").classList.remove("hidden");
}

/* animasi hati */

setInterval(()=>{

let heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},5000);

},300);

</script>

</body>
</html>
```
