<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Kamu ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #8b0000, #c4002f, #ff758c);
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 24px 14px 40px;
    }

    .wrap {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .container {
      width: 100%;
      background: rgba(15, 15, 20, 0.96);
      color: white;
      padding: 24px 18px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      margin-top: 40px;
    }

    h1 {
      color: #ff5c7a;
      font-size: 2rem;
      margin-bottom: 14px;
    }

    h2 {
      color: #ff5c7a;
      font-size: 1.7rem;
      margin: 18px 0 16px;
      line-height: 1.3;
    }

    p {
      color: #e7e7e7;
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 18px;
      word-wrap: break-word;
    }

    #typing {
      min-height: 70px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #d1002f, #ff3d68);
      color: white;
      padding: 15px 18px;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 8px;
      box-shadow: 0 8px 20px rgba(255, 61, 104, 0.35);
    }

    button:hover,
    button:active {
      transform: scale(1.02);
    }

    .image-box {
      margin-top: 14px;
      width: 100%;
      overflow: hidden;
      border-radius: 18px;
      background: #222;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .hidden {
      display: none;
    }

    .heart {
      position: fixed;
      top: -30px;
      font-size: 28px;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 1;
      opacity: 0.9;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.9;
      }
      100% {
        transform: translateY(115vh) scale(1.2);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 18px 12px 32px;
      }

      .container {
        padding: 22px 16px;
        border-radius: 22px;
        margin-top: 28px;
      }

      h1 {
        font-size: 1.8rem;
      }

      h2 {
        font-size: 1.5rem;
      }

      p {
        font-size: 1.05rem;
        line-height: 1.75;
      }

      button {
        font-size: 1.05rem;
        padding: 14px 16px;
      }

      .heart {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <!-- HALAMAN 1 -->
    <div id="halaman1" class="container">
      <h1>Hai Kamu 💗</h1>
      <p id="typing"></p>
      <button onclick="lanjut()">Klik ini ya 🥺👉👈</button>
    </div>

    <!-- HALAMAN 2 -->
    <div id="halaman2" class="container hidden">
      <p>
        Aku tahu, aku sering kali membuat kamu kecewa, sedih dan membuat kamu terpuruk,
        maka dari itu aku bener-bener meminta maaf ya sayangku...
      </p>

      <p>
        Kamu benar-benar sangat berarti bagi aku, jangan menghilang seperti ini dong 😔😔
      </p>

      <h2>Maafin aku ya Cantik</h2>
      </p>
      <h2>😔💗</h2>
      <div class="image-box">
        <img src="foto.jpg" alt="Foto untuk kamu">
      </div>
    </div>
  </div>

  <!-- LAGU -->
  <audio id="lagu" loop>
    <source src="lagu.mp3" type="audio/mpeg">
  </audio>

  <script>
    let text = "Aku punya sesuatu yang ingin aku bilang ke kamu...";
    let i = 0;

    function ketik() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(ketik, 5);
      }
    }

    ketik();

    function lanjut() {
      document.getElementById("halaman1").classList.add("hidden");
      document.getElementById("halaman2").classList.remove("hidden");

      const lagu = document.getElementById("lagu");
      lagu.play().catch(() => {});

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💗";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6500);
    }, 500);
  </script>

</body>
</html>
